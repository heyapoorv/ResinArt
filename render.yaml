services:
  # ── Backend (API) ──────────────────────────────────────────
  - type: web
    name: aura-resin-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: false
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: aura_resin
      - key: ALLOWED_ORIGINS
        sync: false
      - key: RATE_LIMIT_MAX
        value: 100
      - key: LOG_LEVEL
        value: info
