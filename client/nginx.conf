server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;

    # ── Cache-Control per asset type ──────────────────────
    # Vite hashed assets – immutable (1 year)
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|ico|png|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Compressed assets served with correct encoding
    location ~* \.gz$ {
        add_header Content-Encoding gzip;
        gzip off;
    }
    location ~* \.br$ {
        add_header Content-Encoding br;
        gzip off;
    }

    # robots.txt + sitemap – short cache
    location ~* \.(txt|xml)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # ── SPA fallback: serve index.html for all routes ─────
    location / {
        try_files $uri $uri/ /index.html;
        # index.html must NOT be cached (app shell may change on deploy)
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
